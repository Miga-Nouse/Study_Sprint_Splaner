<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body id="fbody">
    
  <main>
    <div class="form-card">
      <h1 class="formal">Contact Us</h1>
      <p class="one">Fill out the form below and we'll get back to you.</p>

      <form action="#" method="post">
       
        <div class="field">
          <label class="two" for="name">Full Name *</label>
          <input type="text" id="name" name="name" required>
        </div>

        
        <div class="field">
          <label class="two" for="email">Email Address *</label>
          <input type="email" id="email" name="email" required>
        </div>

        
        <div class="field">
          <label class="two" for="subject">Subject / Topic *</label>
          <select id="subject" name="subject" required>
            <option value="" disabled selected>— Select a topic —</option>
            <option value="general">General Inquiry</option>
            <option value="support">Technical Support</option>
            <option value="feedback">Website Feedback</option>
            <option value="partnership">Partnership</option>
            <option value="billing">Billing Question</option>
          </select>
        </div>

       
        <div class="field">
          <label class="two" for="message">Message *</label>
          <textarea id="message" name="message" rows="4" required placeholder="My knee grows(insflamatory)"></textarea>
        </div>

        
        <button type="submit" class="submit-btn">Send Message</button>
      </form>

      <p class="note">* Required fields</p>
    </div>
  </main>
  <nav>
        <li><a href="index.html">Back</a></li>
  </nav>
</body>
</html>
